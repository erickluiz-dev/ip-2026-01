<!DOCTYPE html>

<html>
    <head></head>

    <body>
        <header>
            <h1>Criar Conta Médica</h1>
        </header>

        <main>
            <form action="back" method="POST">
                <label for="nome"></label>
                <input type="text" id="nome" name="nome" placeholder="Informe seu nome"><br><br>
                <label for="email"></label>
                <input type="email" id="email" name="email" placeholder="Informe seu email"><br><br>
                <label for="senha"></label>
                <input type="password" id="senha" name="senha" placeholder="Informe sua senha"><br><br>
                <label for="cpf"></label>
                <input type="number" id="cpf" name="cpf" placeholder="Informe seu CPF"><br><br>
                <label for="atuacao"></label>
                <select name="atuacao" id="atuacao">
                    <option value="Cardiologista">Cardiologista</option>
                    <option value="Dermatologista">Dermatologista</option>
                </select><br><br>

                <button type="submit">Finalizar Cadastro</button>
            </form>
        </main>

        <footer>
            <p>Trabalho Introdução à Progamação</p>
        </footer>
    </body>
</html>
